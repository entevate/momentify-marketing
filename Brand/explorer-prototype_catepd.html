<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">

<style>
  body {
    background: #0a0a0a;
    overflow: hidden;
  }

  /* ─── Client Password Gate ─────────────────────── */
  #client-pw-gate {
    position: fixed;
    inset: 0;
    z-index: 9998;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  #client-pw-gate.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .client-pw-box {
    text-align: center;
    max-width: 360px;
    width: 100%;
    padding: 0 24px;
  }
  .client-pw-logo { margin-bottom: 32px; }
  .client-pw-logo svg { height: 36px; width: auto; }
  .client-pw-label {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .client-pw-input-row { display: flex; gap: 8px; }
  .client-pw-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .client-pw-input:focus { border-color: #FFCC00; }
  .client-pw-input.error {
    border-color: #E5484D;
    animation: client-shake 0.4s ease;
  }
  .client-pw-submit {
    padding: 12px 20px;
    border-radius: 10px;
    border: 1px solid #FFCC00;
    background: transparent;
    color: #FFCC00;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .client-pw-submit:hover { background: #FFCC00; color: #000; }
  .client-pw-error {
    font-size: 12px;
    color: #E5484D;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .client-pw-error.visible { opacity: 1; }
  @keyframes client-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }

  /* ─── iPad Bezel ────────────────────────── */
  #ipad-wrapper {
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    width: 100vw;
    height: calc(100vh - 60px);
  }
  #ipad-wrapper.visible { display: flex; }

  .ipad-bezel {
    position: relative;
    width: 1446px;
    height: 1104px;
    background: #1a1a1a;
    border-radius: 36px;
    border: 2px solid rgba(255,255,255,0.08);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 20px 80px rgba(0,0,0,0.6),
      0 4px 20px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.06);
    padding: 40px;
    transform-origin: center center;
  }

  .ipad-screen {
    width: 1366px;
    height: 1024px;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }

  .ipad-screen iframe {
    width: 1366px;
    height: 1024px;
    border: none;
    display: block;
  }

  .ipad-camera {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2a2a;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .powered-by {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.03em;
    white-space: nowrap;
    text-align: center;
    flex-shrink: 0;
  }
  .powered-by a {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
  }
</style>
</head>
<body>

    </div>
    <div class="client-pw-label">Enter password to continue</div>
    <div class="client-pw-input-row">
      <input type="password" class="client-pw-input" id="client-pw-input" placeholder="Password" autocomplete="off" autofocus>
      <button class="client-pw-submit" id="client-pw-submit">Enter</button>

    <div class="client-pw-error" id="client-pw-error">Incorrect password. Please try again.</div>

<!-- iPad Bezel -->
<div id="ipad-wrapper">
  <div class="ipad-bezel" id="ipad-bezel">
    <div class="ipad-camera"></div>
    <div class="ipad-screen">
      <iframe id="proto-frame" src="about:blank"></iframe>
    </div>
  </div>
  <div class="powered-by">Prototype preview -- best viewed in landscape on desktop</div>
</div>

<script>
  var CLIENT_PASSWORD = 'electricpower';

  function checkClientPassword() {
    var input = document.getElementById('client-pw-input');
    var error = document.getElementById('client-pw-error');
    if (input.value === CLIENT_PASSWORD) {
      var gate = document.getElementById('client-pw-gate');
      gate.classList.add('hidden');
      setTimeout(function() { gate.style.display = 'none'; }, 400);
      document.getElementById('ipad-wrapper').classList.add('visible');
      document.getElementById('proto-frame').src = 'explorer-prototype_cat.html';
      scaleBezel();
    } else {
      input.classList.add('error');
      error.classList.add('visible');
      setTimeout(function() { input.classList.remove('error'); }, 400);
      input.select();
    }
  }

  document.getElementById('client-pw-submit').addEventListener('click', checkClientPassword);
  document.getElementById('client-pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkClientPassword();
    document.getElementById('client-pw-error').classList.remove('visible');
  });

  function scaleBezel() {
    var bezel = document.getElementById('ipad-bezel');
    if (!bezel) return;
    var vw = window.innerWidth;
    var vh = window.innerHeight - 60;
    var bw = 1446;
    var bh = 1104;
    var scaleX = (vw - 40) / bw;
    var scaleY = (vh - 70) / bh;
    var scale = Math.min(scaleX, scaleY, 1);
    bezel.style.transform = 'scale(' + scale + ')';
  }

  window.addEventListener('resize', scaleBezel);
</script>
