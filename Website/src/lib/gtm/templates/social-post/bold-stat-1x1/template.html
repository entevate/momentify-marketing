<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary: {{PRIMARY}};
    --primary-light: {{PRIMARY_LIGHT}};
    --primary-dark: {{PRIMARY_DARK}};
    --hero-grad: {{HERO_GRAD}};
    orphans: 3; widows: 3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    background: var(--primary-dark);
  }
  .stage {
    width: 100%;
    height: 100%;
    background-color: var(--primary-dark);
    background-image:
      {{DECOR_PATTERN}},
      var(--hero-grad);
    background-size: {{DECOR_SIZE}}, cover;
    background-position: 0 0, center;
    background-repeat: repeat, no-repeat;
    padding: 7% 8%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 3%;
    position: relative;
    overflow: hidden;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }
  .label {
    font-size: clamp(9px, 1.5vw, 15px);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.88;
  }
  .label::after {
    content: "";
    display: block;
    width: 32px;
    height: 3px;
    background: var(--primary-light);
    margin-top: 7px;
  }
  main {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }
  .stat {
    font-weight: 900;
    font-size: clamp(56px, 30vw, 360px);
    line-height: 0.88;
    letter-spacing: -0.05em;
    color: #fff;
  }
  .tagline {
    font-size: clamp(14px, 3.2vw, 38px);
    line-height: 1.38;
    font-weight: 300;
    max-width: 88%;
    margin-top: clamp(10px, 2vw, 22px);
    color: rgba(255,255,255,0.90);
    text-wrap: pretty;
  }
  footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 1;
  }
  .brand {
    font-size: clamp(11px, 2vw, 20px);
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.95);
  }
  .accent-dot {
    width: clamp(6px, 1.2vw, 12px);
    height: clamp(6px, 1.2vw, 12px);
    border-radius: 50%;
    background: var(--primary-light);
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="stage">
    <header>
      <div class="label">{{LABEL}}</div>
      <div class="accent-dot"></div>
    </header>
    <main>
      <div class="stat">{{STAT}}</div>
      <p class="tagline">{{TAGLINE}}</p>
    </main>
    <footer>
      <span class="brand">{{BRAND}}</span>
    </footer>
  </div>
</body>
</html>
