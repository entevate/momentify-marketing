<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary:      {{PRIMARY}};
    --primary-light:{{PRIMARY_LIGHT}};
    --primary-dark: {{PRIMARY_DARK}};
    --hero-grad:    {{HERO_GRAD}};
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    background: #06060f;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fff;
  }
  .stage {
    width: 1080px; height: 1080px;
    flex-shrink: 0;
    transform-origin: center center;
    background: var(--hero-grad);
    padding: 76px 86px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    overflow: hidden;
  }
  .stage::before {
    content: "";
    position: absolute; inset: 0;
    background-image: {{DECOR_PATTERN}};
    background-size: {{DECOR_SIZE}};
    pointer-events: none; z-index: 0;
  }
  .stage::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(7,8,31,0.30) 0%, transparent 45%, rgba(7,8,31,0.55) 100%);
    pointer-events: none; z-index: 0;
  }
  .geo {
    position: absolute; top: 0; right: 0;
    width: 75%; height: 75%;
    pointer-events: none; z-index: 0; overflow: visible;
  }
  header, main, footer { position: relative; z-index: 1; }
  header { display: flex; justify-content: space-between; align-items: flex-start; align-self: start; }
  .eyebrow {
    font-size: 22px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; color: #0CF4DF;
  }
  .eyebrow::after {
    content: ""; display: block;
    width: 44px; height: 3px;
    background: #0CF4DF; margin-top: 22px; opacity: 0.65;
  }
  .accent-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #0CF4DF; flex-shrink: 0; margin-top: 4px;
  }
  main {
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    gap: 28px;
  }
  .stat {
    font-weight: 700; font-size: 240px;
    line-height: 0.88; letter-spacing: -0.04em; color: #fff;
  }
  .tagline {
    font-size: 46px; line-height: 1.35; font-weight: 300;
    max-width: 88%; margin-top: 8px;
    color: rgba(255,255,255,0.82);
    text-wrap: pretty;
  }
  footer {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-top: 1px solid rgba(255,255,255,0.12); padding-top: 32px;
  }
  .logo { width: 200px; height: auto; opacity: 0.92; }
  .domain {
    font-size: 24px; font-weight: 400;
    letter-spacing: 0.05em; color: rgba(255,255,255,0.55);
  }
</style>
</head>

    <div class="eyebrow">{{LABEL}}</div>
