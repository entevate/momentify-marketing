<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary: {{PRIMARY}};
    --primary-light: {{PRIMARY_LIGHT}};
    --primary-dark: {{PRIMARY_DARK}};
    --light-bg: {{LIGHT_BG}};
    orphans: 3; widows: 3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #181818;
    background: #fff;
  }
  .stage {
    width: 100%;
    height: 100%;
    background: #fff;
    display: grid;
    grid-template-columns: 6px 1fr;
    overflow: hidden;
  }
  .accent-bar {
    background: var(--primary);
    width: 6px;
    height: 100%;
    flex-shrink: 0;
  }
  .content {
    padding: 7% 8%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 6%;
    position: relative;
  }
  /* Subtle tinted background region */
  .content::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 35%;
    background: var(--light-bg);
    z-index: 0;
  }
  header, main, footer {
    position: relative;
    z-index: 1;
  }
  .eyebrow {
    font-size: clamp(8px, 1.2vw, 13px);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: clamp(8px, 1.5vw, 16px);
  }
  .headline {
    font-size: clamp(20px, 4.2vw, 52px);
    font-weight: 800;
    line-height: 1.12;
    letter-spacing: -0.025em;
    color: #181818;
    text-wrap: pretty;
  }
  main {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .quote-mark {
    font-size: clamp(36px, 7vw, 80px);
    line-height: 0.8;
    font-weight: 900;
    color: var(--primary);
    opacity: 0.25;
    margin-bottom: clamp(-4px, -0.5vw, -8px);
  }
  .quote {
    font-size: clamp(14px, 2.6vw, 30px);
    line-height: 1.5;
    font-weight: 400;
    color: #2a2a2a;
    text-wrap: pretty;
  }
  .attribution {
    font-size: clamp(10px, 1.6vw, 17px);
    font-weight: 500;
    color: #666;
    margin-top: clamp(10px, 1.8vw, 20px);
  }
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 4%;
    border-top: 1.5px solid rgba(0,0,0,0.08);
  }
  .brand {
    font-size: clamp(10px, 1.6vw, 17px);
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--primary-dark);
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: clamp(7px, 1vw, 10px) clamp(12px, 2vw, 20px);
    background: var(--primary);
    border-radius: 100px;
    font-size: clamp(9px, 1.4vw, 14px);
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="accent-bar"></div>
    <div class="content">
      <header>
        <div class="eyebrow">Momentify</div>
        <h1 class="headline">{{HEADLINE}}</h1>
      </header>
      <main>
        <div class="quote-mark">&ldquo;</div>
        <p class="quote">{{QUOTE}}</p>
        <p class="attribution">{{ATTRIBUTION}}</p>
      </main>
      <footer>
        <span class="brand">Momentify</span>
        <span class="cta">{{CTA}} &rarr;</span>
      </footer>
    </div>
  </div>
</body>
</html>
