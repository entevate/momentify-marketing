<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary: {{PRIMARY}};
    --primary-light: {{PRIMARY_LIGHT}};
    --primary-dark: {{PRIMARY_DARK}};
    --hero-grad: {{HERO_GRAD}};
    orphans: 3; widows: 3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    background: var(--primary-dark);
  }
  .stage {
    width: 100%;
    height: 100%;
    background-color: var(--primary-dark);
    background-image:
      {{DECOR_PATTERN}},
      var(--hero-grad);
    background-size: {{DECOR_SIZE}}, cover;
    background-position: 0 0, center;
    background-repeat: repeat, no-repeat;
    display: grid;
    grid-template-columns: 1fr 38%;
    position: relative;
    overflow: hidden;
  }
  /* Right-side decorative gradient overlay */
  .stage::after {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 50%;
    height: 100%;
    background: radial-gradient(ellipse at 80% 50%, var(--primary-light) 0%, transparent 70%);
    opacity: 0.18;
    pointer-events: none;
  }
  .left {
    padding: 7% 8%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5%;
    position: relative;
    z-index: 1;
  }
  .eyebrow {
    font-size: clamp(8px, 0.9vw, 13px);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--primary-light);
  }
  .headline {
    font-size: clamp(22px, 3.8vw, 58px);
    font-weight: 900;
    line-height: 1.06;
    letter-spacing: -0.04em;
    color: #fff;
    text-wrap: pretty;
    max-width: 90%;
  }
  .subheadline {
    font-size: clamp(12px, 1.5vw, 22px);
    font-weight: 400;
    line-height: 1.4;
    color: rgba(255,255,255,0.80);
    max-width: 85%;
  }
  .cta-row {
    display: flex;
    align-items: center;
    gap: clamp(10px, 1.5vw, 20px);
    margin-top: 2%;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: clamp(8px, 0.9vw, 12px) clamp(16px, 1.8vw, 26px);
    background: var(--primary-light);
    border-radius: 100px;
    font-size: clamp(10px, 1.1vw, 15px);
    font-weight: 700;
    color: var(--primary-dark);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .brand {
    font-size: clamp(10px, 1.1vw, 15px);
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  /* Right column: purely decorative gradient orb */
  .right {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .orb {
    width: 55%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, var(--primary-light), var(--primary) 50%, transparent 75%);
    opacity: 0.22;
    filter: blur(2px);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="left">
      <div class="eyebrow">Momentify</div>
      <h1 class="headline">{{HEADLINE}}</h1>
      <p class="subheadline">{{SUBHEADLINE}}</p>
      <div class="cta-row">
        <span class="cta">{{CTA}} &rarr;</span>
        <span class="brand">momentify.com</span>
      </div>
    </div>
    <div class="right">
      <div class="orb"></div>
    </div>
  </div>
</body>
</html>
