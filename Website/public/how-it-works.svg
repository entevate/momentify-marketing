<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet">
<style>
  @keyframes spineDraw {
    0% { stroke-dashoffset: 640; }
    33% { stroke-dashoffset: 426; }
    66% { stroke-dashoffset: 213; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes step1In {
    0%, 2% { opacity: 0.25; }
    8% { opacity: 1; }
    33% { opacity: 1; }
    38% { opacity: 0.25; }
    100% { opacity: 0.25; }
  }
  @keyframes step2In {
    0%, 33% { opacity: 0.25; }
    38% { opacity: 1; }
    66% { opacity: 1; }
    71% { opacity: 0.25; }
    100% { opacity: 0.25; }
  }
  @keyframes step3In {
    0%, 66% { opacity: 0.25; }
    71% { opacity: 1; }
    100% { opacity: 1; }
  }
  @keyframes pulse1 {
    0%, 2% { transform: scale(1); opacity: 0; }
    8% { opacity: 0.8; }
    15% { transform: scale(2.2); opacity: 0; }
    33%, 100% { transform: scale(1); opacity: 0; }
  }
  @keyframes pulse2 {
    0%, 33% { transform: scale(1); opacity: 0; }
    38% { opacity: 0.8; }
    48% { transform: scale(2.2); opacity: 0; }
    66%, 100% { transform: scale(1); opacity: 0; }
  }
  @keyframes pulse3 {
    0%, 66% { transform: scale(1); opacity: 0; }
    71% { opacity: 0.8; }
    82% { transform: scale(2.2); opacity: 0; }
    100% { transform: scale(1); opacity: 0; }
  }
  @keyframes node1Fill {
    0%, 2% { fill: transparent; }
    8%, 33% { fill: #5FD9C2; }
    38%, 100% { fill: transparent; }
  }
  @keyframes node2Fill {
    0%, 33% { fill: transparent; }
    38%, 66% { fill: #6B21D4; }
    71%, 100% { fill: transparent; }
  }
  @keyframes node3Fill {
    0%, 66% { fill: transparent; }
    71%, 100% { fill: #F2B33D; }
  }
  @keyframes fadeStep1 {
    0%, 2% { opacity: 0; transform: translateY(8px); }
    10% { opacity: 1; transform: translateY(0); }
    33% { opacity: 1; }
    38% { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes fadeStep1Body {
    0%, 5% { opacity: 0; transform: translateY(8px); }
    13% { opacity: 1; transform: translateY(0); }
    33% { opacity: 1; }
    38% { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes fadeStep2 {
    0%, 33% { opacity: 0; transform: translateY(8px); }
    42% { opacity: 1; transform: translateY(0); }
    66% { opacity: 1; }
    71% { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes fadeStep2Body {
    0%, 36% { opacity: 0; transform: translateY(8px); }
    45% { opacity: 1; transform: translateY(0); }
    66% { opacity: 1; }
    71% { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes fadeStep3 {
    0%, 66% { opacity: 0; transform: translateY(8px); }
    75% { opacity: 1; transform: translateY(0); }
    95% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes fadeStep3Body {
    0%, 69% { opacity: 0; transform: translateY(8px); }
    78% { opacity: 1; transform: translateY(0); }
    95% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes bottomFade {
    0%, 85% { opacity: 0; }
    92%, 98% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes icon1Draw {
    0%, 2% { stroke-dashoffset: 200; }
    16% { stroke-dashoffset: 0; }
    33% { stroke-dashoffset: 0; }
    38%, 100% { stroke-dashoffset: 200; }
  }
  @keyframes icon2Draw {
    0%, 33% { stroke-dashoffset: 200; }
    48% { stroke-dashoffset: 0; }
    66% { stroke-dashoffset: 0; }
    71%, 100% { stroke-dashoffset: 200; }
  }
  @keyframes icon3Draw {
    0%, 66% { stroke-dashoffset: 200; }
    82% { stroke-dashoffset: 0; }
    95% { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: 200; }
  }

  .spine { stroke-dasharray: 640; animation: spineDraw 9s linear infinite; }
  .step1-group { animation: step1In 9s ease infinite; }
  .step2-group { animation: step2In 9s ease infinite; }
  .step3-group { animation: step3In 9s ease infinite; }
  .pulse1 { transform-origin: 56px 130px; animation: pulse1 9s ease infinite; }
  .pulse2 { transform-origin: 56px 380px; animation: pulse2 9s ease infinite; }
  .pulse3 { transform-origin: 56px 630px; animation: pulse3 9s ease infinite; }
  .node1 { animation: node1Fill 9s ease infinite; }
  .node2 { animation: node2Fill 9s ease infinite; }
  .node3 { animation: node3Fill 9s ease infinite; }
  .step1-content { animation: fadeStep1 9s ease infinite; }
  .step1-body { animation: fadeStep1Body 9s ease infinite; }
  .step2-content { animation: fadeStep2 9s ease infinite; }
  .step2-body { animation: fadeStep2Body 9s ease infinite; }
  .step3-content { animation: fadeStep3 9s ease infinite; }
  .step3-body { animation: fadeStep3Body 9s ease infinite; }
  .bottom-bar { animation: bottomFade 9s ease infinite; }
  .icon1 { stroke-dasharray: 200; animation: icon1Draw 9s ease infinite; }
  .icon2 { stroke-dasharray: 200; animation: icon2Draw 9s ease infinite; }
  .icon3 { stroke-dasharray: 200; animation: icon3Draw 9s ease infinite; }

  text { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
</style>

<!-- Timeline spine base -->
<line x1="56" y1="60" x2="56" y2="700" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
<!-- Animated spine -->
<line x1="56" y1="60" x2="56" y2="700" stroke="white" stroke-opacity="0.6" stroke-width="2" class="spine"/>

<!-- Step 1 accent bar -->
<g class="step1-group">
  <rect x="96" y="96" width="3" height="218" rx="1.5" fill="#5FD9C2"/>
</g>
<!-- Step 2 accent bar -->
<g class="step2-group">
  <rect x="96" y="346" width="3" height="218" rx="1.5" fill="#6B21D4"/>
</g>
<!-- Step 3 accent bar -->
<g class="step3-group">
  <rect x="96" y="596" width="3" height="140" rx="1.5" fill="#F2B33D"/>
</g>

<!-- Step 1 node -->
<circle cx="56" cy="130" r="16" class="node1" stroke="white" stroke-width="1.5" stroke-opacity="0.25"/>
<circle cx="56" cy="130" r="16" fill="none" stroke="#5FD9C2" stroke-width="1.5" class="pulse1"/>
<text x="56" y="136" text-anchor="middle" fill="white" font-size="15" font-weight="700" class="step1-group">1</text>

<!-- Step 2 node -->
<circle cx="56" cy="380" r="16" class="node2" stroke="white" stroke-width="1.5" stroke-opacity="0.25"/>
<circle cx="56" cy="380" r="16" fill="none" stroke="#6B21D4" stroke-width="1.5" class="pulse2"/>
<text x="56" y="386" text-anchor="middle" fill="white" font-size="15" font-weight="700" class="step2-group">2</text>

<!-- Step 3 node -->
<circle cx="56" cy="630" r="16" class="node3" stroke="white" stroke-width="1.5" stroke-opacity="0.25"/>
<circle cx="56" cy="630" r="16" fill="none" stroke="#F2B33D" stroke-width="1.5" class="pulse3"/>
<text x="56" y="636" text-anchor="middle" fill="white" font-size="15" font-weight="700" class="step3-group">3</text>

<!-- ═══ Step 1 Content ═══ -->
<g class="step1-content">
  <!-- Step label -->
  <text x="118" y="114" fill="#0CF4DF" font-size="13" font-weight="600" letter-spacing="0.12em">STEP 1</text>
  <!-- Icon: browser window -->
  <g class="icon1" transform="translate(118, 126)">
    <rect x="0" y="0" width="48" height="36" rx="4" stroke="#0CF4DF" stroke-width="1.8" fill="none"/>
    <line x1="0" y1="11" x2="48" y2="11" stroke="#0CF4DF" stroke-width="1.8"/>
    <circle cx="8" cy="5.5" r="2" stroke="#0CF4DF" stroke-width="1" fill="none"/>
    <circle cx="16" cy="5.5" r="2" stroke="#0CF4DF" stroke-width="1" fill="none"/>
    <circle cx="24" cy="5.5" r="2" stroke="#0CF4DF" stroke-width="1" fill="none"/>
  </g>
  <!-- Product name -->
  <text x="118" y="190" fill="white" font-size="20" font-weight="700">Momentify Web</text>
  <!-- Headline -->
  <text x="118" y="222" fill="white" font-size="28" font-weight="500" letter-spacing="-0.02em">Set up. Configure. Deploy.</text>
</g>
<!-- Body (delayed) -->
<g class="step1-body">
  <text x="118" y="252" fill="white" fill-opacity="0.6" font-size="16" font-weight="400">
    <tspan x="118" dy="0">Build your events, templates, and engagement</tspan>
    <tspan x="118" dy="26">flows ahead of time. Define your personas, map</tspan>
    <tspan x="118" dy="26">your content, and set your team up before</tspan>
    <tspan x="118" dy="26">anyone steps on the floor.</tspan>
  </text>
</g>

<!-- ═══ Step 2 Content ═══ -->
<g class="step2-content">
  <!-- Step label -->
  <text x="118" y="364" fill="#0CF4DF" font-size="13" font-weight="600" letter-spacing="0.12em">STEP 2</text>
  <!-- Icon: tablet with ripple -->
  <g class="icon2" transform="translate(118, 376)">
    <rect x="5" y="0" width="32" height="48" rx="4" stroke="#0CF4DF" stroke-width="1.8" fill="none"/>
    <circle cx="21" cy="24" r="5" stroke="#0CF4DF" stroke-width="1.5" fill="none"/>
    <circle cx="21" cy="24" r="10" stroke="#0CF4DF" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>
  <!-- Product name -->
  <text x="118" y="446" fill="white" font-size="20" font-weight="700">Momentify Explorer</text>
  <!-- Headline -->
  <text x="118" y="478" fill="white" font-size="28" font-weight="500" letter-spacing="-0.02em">Engage. Capture. Contextualize.</text>
</g>
<!-- Body (delayed) -->
<g class="step2-body">
  <text x="118" y="508" fill="white" fill-opacity="0.6" font-size="16" font-weight="400">
    <tspan x="118" dy="0">Attendees, candidates, and visitors interact</tspan>
    <tspan x="118" dy="26">through iPads, touch displays, and mobile</tspan>
    <tspan x="118" dy="26">devices. Every tap, every content selection,</tspan>
    <tspan x="118" dy="26">and every conversation detail is captured in</tspan>
    <tspan x="118" dy="26">real time with role-specific context attached.</tspan>
  </text>
</g>

<!-- ═══ Step 3 Content ═══ -->
<g class="step3-content">
  <!-- Step label -->
  <text x="118" y="614" fill="#0CF4DF" font-size="13" font-weight="600" letter-spacing="0.12em">STEP 3</text>
  <!-- Icon: line chart -->
  <g class="icon3" transform="translate(118, 626)">
    <line x1="0" y1="48" x2="48" y2="48" stroke="#0CF4DF" stroke-width="1.8"/>
    <polyline points="5,38 17,26 30,33 43,10" stroke="#0CF4DF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="5" cy="38" r="3" stroke="#0CF4DF" stroke-width="1.5" fill="none"/>
    <circle cx="17" cy="26" r="3" stroke="#0CF4DF" stroke-width="1.5" fill="none"/>
    <circle cx="30" cy="33" r="3" stroke="#0CF4DF" stroke-width="1.5" fill="none"/>
    <circle cx="43" cy="10" r="3" stroke="#0CF4DF" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Product name -->
  <text x="118" y="698" fill="white" font-size="20" font-weight="700">Momentify Intelligence</text>
  <!-- Headline -->
  <text x="118" y="730" fill="white" font-size="28" font-weight="500" letter-spacing="-0.02em">Analyze. Score. Prove.</text>
</g>
<!-- Body (delayed) -->
<g class="step3-body">
  <text x="118" y="760" fill="white" fill-opacity="0.6" font-size="16" font-weight="400">
    <tspan x="118" dy="0">Real-time ROX dashboards surface who engaged,</tspan>
    <tspan x="118" dy="26">how deeply, and what they cared about. Leads</tspan>
    <tspan x="118" dy="26">are scored and routed automatically. Your team</tspan>
    <tspan x="118" dy="26">acts while the moment still matters.</tspan>
  </text>
</g>

<!-- Bottom bar -->
<text x="440" y="790" text-anchor="middle" fill="white" fill-opacity="0.25" font-size="13" font-weight="600" letter-spacing="0.08em" class="bottom-bar">Contact. Conversation. Context.</text>
</svg>