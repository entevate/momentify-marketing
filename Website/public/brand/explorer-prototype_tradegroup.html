<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentify Explorer (The Trade Group) - Brand Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  body {
    background: #0D0D0D;
    overflow: hidden;
  }

  /* ─── Client Password Gate ─────────────────────── */
  #client-pw-gate {
    position: fixed;
    inset: 0;
    z-index: 9998;
    background: #0D0D0D;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  #client-pw-gate.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .client-pw-box {
    text-align: center;
    max-width: 360px;
    width: 100%;
    padding: 0 24px;
  }
  .client-pw-logo { margin-bottom: 32px; }
  .client-pw-logo img {
    height: 64px;
    width: auto;
  }
  .client-pw-label {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .client-pw-input-row { display: flex; gap: 8px; }
  .client-pw-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .client-pw-input:focus { border-color: #CD9F26; }
  .client-pw-input.error {
    border-color: #E5484D;
    animation: client-shake 0.4s ease;
  }
  .client-pw-submit {
    padding: 12px 20px;
    border-radius: 10px;
    border: 1px solid #CD9F26;
    background: transparent;
    color: #CD9F26;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .client-pw-submit:hover { background: #CD9F26; color: #0D0D0D; }
  .client-pw-error {
    font-size: 12px;
    color: #E5484D;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .client-pw-error.visible { opacity: 1; }
  @keyframes client-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }

  /* ─── iPad Pro 13" M4 Bezel ─────────────── */
  #ipad-wrapper {
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    width: 100vw;
    height: 100vh;
  }
  #ipad-wrapper.visible { display: flex; }

  .ipad-bezel {
    position: relative;
    width: 1398px;
    height: 1056px;
    background: #1a1a1a;
    border-radius: 22px;
    border: 1.5px solid rgba(255,255,255,0.1);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 30px 100px rgba(0,0,0,0.65),
      0 6px 24px rgba(0,0,0,0.4),
      inset 0 0.5px 0 rgba(255,255,255,0.08);
    padding: 16px;
    transform-origin: center center;
  }

  .ipad-screen {
    width: 1366px;
    height: 1024px;
    border-radius: 6px;
    overflow: hidden;
    background: #0D0D0D;
  }

  .ipad-screen iframe {
    width: 1366px;
    height: 1024px;
    border: none;
    display: block;
  }

  .ipad-camera {
    position: absolute;
    top: 50%;
    right: 5px;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 0.5px solid rgba(255,255,255,0.06);
  }

  .powered-by {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.03em;
    white-space: nowrap;
    text-align: center;
    flex-shrink: 0;
  }
  .powered-by a {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
  }
</style>
</head>
<body>

<!-- Client Password Gate -->
<div id="client-pw-gate">
  <div class="client-pw-box">
    <div class="client-pw-logo">
      <img src="https://cdn.prod.website-files.com/66394664250554797297fc4f/6684172fbf73d08d2a24a75f_ttg-logo-white.svg" alt="The Trade Group" />
    </div>
    <div class="client-pw-label">Enter password to continue</div>
    <div class="client-pw-input-row">
      <input type="password" class="client-pw-input" id="client-pw-input" placeholder="Password" autocomplete="off" autofocus>
      <button class="client-pw-submit" id="client-pw-submit">Enter</button>
    </div>
    <div class="client-pw-error" id="client-pw-error">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- iPad Bezel -->
<div id="ipad-wrapper">
  <div class="ipad-bezel" id="ipad-bezel">
    <div class="ipad-camera"></div>
    <div class="ipad-screen">
      <iframe id="proto-frame" src="about:blank"></iframe>
    </div>
  </div>
  <div class="powered-by">Prototype preview -- best viewed in landscape on desktop</div>
</div>

<script>
  var CLIENT_PASSWORD = 'tradegroup2026';

  function checkClientPassword() {
    var input = document.getElementById('client-pw-input');
    var error = document.getElementById('client-pw-error');
    if (input.value === CLIENT_PASSWORD) {
      var gate = document.getElementById('client-pw-gate');
      gate.classList.add('hidden');
      setTimeout(function() { gate.style.display = 'none'; }, 400);
      document.getElementById('ipad-wrapper').classList.add('visible');
      document.getElementById('proto-frame').src = 'explorer-prototype_tradegroup_explorer.html';
      scaleBezel();
    } else {
      input.classList.add('error');
      error.classList.add('visible');
      setTimeout(function() { input.classList.remove('error'); }, 400);
      input.value = '';
      input.focus();
    }
  }

  document.getElementById('client-pw-submit').addEventListener('click', checkClientPassword);
  document.getElementById('client-pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkClientPassword();
    document.getElementById('client-pw-error').classList.remove('visible');
  });

  function scaleBezel() {
    var bezel = document.getElementById('ipad-bezel');
    var w = window.innerWidth, h = window.innerHeight - 32;
    var sx = w / 1398, sy = h / 1056;
    bezel.style.transform = 'scale(' + Math.min(sx, sy, 1) + ')';
  }
  window.addEventListener('resize', scaleBezel);
</script>
</body>
</html>
