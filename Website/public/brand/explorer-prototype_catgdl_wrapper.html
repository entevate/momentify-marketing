<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentify Explorer (CAT GDL) - SkillsUSA IPEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#E8E9EF;}

/* ─── TV Bezel ─── */
.tv{position:relative;display:flex;flex-direction:column;align-items:center;}
.tv-frame{position:relative;border-radius:6px;overflow:hidden;transition:all 0.4s ease;}
.tv-frame{background:#0C0C0C;box-shadow:0 4px 50px rgba(0,0,0,0.6),0 1px 4px rgba(0,0,0,0.3),inset 0 0 0 1px rgba(255,255,255,0.03);}
.tv-bezel-top{height:10px;background:#0C0C0C;position:relative;}
.tv-bezel-bottom{height:18px;background:#0C0C0C;display:flex;align-items:center;justify-content:center;position:relative;}
.tv-bezel-side{position:absolute;top:0;bottom:0;width:8px;background:#0C0C0C;z-index:2;}
.tv-bezel-side.left{left:0;}
.tv-bezel-side.right{right:0;}
.tv-brand{font-size:7px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.15);}
.tv-screen{position:relative;background:#000;overflow:hidden;}
.tv-screen iframe{display:block;border:none;width:100%;height:100%;}

/* ─── TV Stand ─── */
.tv-stand{display:flex;flex-direction:column;align-items:center;margin-top:-2px;}
.tv-neck{width:40px;height:20px;background:linear-gradient(180deg,#0C0C0C 0%,#1A1A1A 100%);border-radius:0 0 4px 4px;transition:background 0.4s;}
.tv-base{width:140px;height:8px;background:linear-gradient(180deg,#1A1A1A 0%,#111 100%);border-radius:0 0 20px 20px;margin-top:-1px;transition:background 0.4s;}
.tv-base{box-shadow:0 2px 8px rgba(0,0,0,0.15);}

/* ─── Controls ─── */
.controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px;}
.ctrl-btn{padding:7px 16px;border-radius:6px;border:none;font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.06em;}
.ctrl-btn{background:#fff;color:#555;border:1px solid rgba(0,0,0,0.08);}
.ctrl-btn:hover{background:#F0F1F8;}
.ctrl-btn.active{background:#FFCC00!important;color:#1A1A1A!important;border-color:#FFCC00!important;}

/* ─── Scenario indicator ─── */
.scenario-bar{display:flex;align-items:center;gap:8px;margin-top:10px;}
.scenario-dot{width:6px;height:6px;border-radius:50%;transition:all 0.3s;}
.scenario-dot{background:rgba(0,0,0,0.12);}
.scenario-dot.active{background:#FFCC00!important;width:20px;border-radius:3px;}
.scenario-label{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;margin:0 4px;transition:color 0.4s;}
.scenario-label{color:rgba(0,0,0,0.25);}
.scenario-arrow{width:28px;height:28px;border-radius:50%;border:1px solid rgba(128,128,128,0.2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;padding:0;}
.scenario-arrow svg{width:14px;height:14px;}
.scenario-arrow{color:rgba(0,0,0,0.3);}.scenario-arrow:hover{background:rgba(0,0,0,0.05);color:#1A1A1A;border-color:rgba(0,0,0,0.2);}

/* ─── Zoom slider ─── */
.zoom-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.zoom-label{font-size:9px;text-transform:uppercase;letter-spacing:0.06em;transition:color 0.4s;}
.zoom-label{color:rgba(0,0,0,0.25);}
.zoom-slider{-webkit-appearance:none;appearance:none;width:140px;height:4px;border-radius:2px;outline:none;transition:background 0.3s;}
.zoom-slider{background:rgba(0,0,0,0.08);}
.zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#FFCC00;cursor:pointer;border:none;}

/* ─── Footer ─── */
.powered{text-align:center;margin-top:10px;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;transition:color 0.4s;}
.powered{color:rgba(0,0,0,0.18);}
.powered span{color:#FFCC00;font-weight:600;}
</style>
</head>
<body class="dark">

<div class="tv" id="tv">
  <div class="tv-frame">
    <div class="tv-bezel-top"></div>
    <div class="tv-bezel-side left"></div>
    <div class="tv-bezel-side right"></div>
    <div class="tv-screen" id="screen">
      <iframe id="proto-frame" src="explorer-prototype_catgdl.html"></iframe>
    </div>
    <div class="tv-bezel-bottom"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="btn-light" onclick="setTheme('light')">Light</button>
    <button class="ctrl-btn active" id="btn-dark" onclick="setTheme('dark')">Dark</button>
  </div>
  <div class="zoom-row">
    <span class="zoom-label">Zoom</span>
    <input type="range" class="zoom-slider" id="zoom-slider" min="50" max="150" value="100" step="5">
    <span class="zoom-label" id="zoom-pct">100%</span>
  </div>
  <div class="scenario-bar" id="scenario-bar">
    <button class="scenario-arrow" onclick="stopAutoplay();prevScenario()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="scenario-dot active"></div>
    <div class="scenario-dot"></div>
    <div class="scenario-dot"></div>
    <div class="scenario-dot"></div>
    <div class="scenario-dot"></div>
    <span class="scenario-label" id="scenario-label">Full Stock</span>
    <button class="scenario-arrow" onclick="stopAutoplay();nextScenario()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>

<script>
function sizeTV(){
  var vw=window.innerWidth,vh=window.innerHeight;
  var zoom=(typeof zoomLevel!=='undefined'?zoomLevel:100)/100;
  var pad=30,bottomSpace=120;
  var maxW=vw-pad*2,maxH=vh-pad*2-bottomSpace;
  var w,h;
  // 16:9 landscape
  if(maxW/maxH > 16/9){ h=maxH; w=h*(16/9); }
  else { w=maxW; h=w*(9/16); }
  w=Math.round(w*zoom); h=Math.round(h*zoom);
  var screen=document.getElementById('screen');
  screen.style.width=w+'px';
  screen.style.height=h+'px';
  document.getElementById('proto-frame').style.width=w+'px';
  document.getElementById('proto-frame').style.height=h+'px';
}

var contentTheme='dark';
function setTheme(mode){
  contentTheme=mode;
  document.getElementById('btn-light').className='ctrl-btn'+(mode==='light'?' active':'');
  document.getElementById('btn-dark').className='ctrl-btn'+(mode==='dark'?' active':'');
  var frame=document.getElementById('proto-frame');
  if(frame.contentWindow) frame.contentWindow.postMessage({theme:mode},'*');
}

/* ─── Scenario cycling ─── */
// Each scenario uses a unique global var name so the counter resets per scenario
var scenarios=[
  {name:'Full Stock',pins:'function(){return 10;}'},
  {name:'Early Exchanges',pins:'function(){window._s2=(window._s2||0)+1;return [10,9,8,10,7,9,8,10,9,10,8,7,10,9,8,7,10,10,9,8,10,7,9,8,10,9,10,8,7,10,9,8,7,10,10,9,8,10,7,9,8,10][(window._s2-1)%42];}'},
  {name:'Mid Event',pins:'function(){window._s3=(window._s3||0)+1;return [7,5,3,8,4,6,5,3,7,4,6,8,3,5,7,4,6,8,3,5,7,4,6,8,3,5,7,4,6,8,3,5,7,4,6,8,3,5,7,4,6,8][(window._s3-1)%42];}'},
  {name:'Low Inventory',pins:'function(){window._s4=(window._s4||0)+1;return [0,2,1,5,0,3,1,4,0,2,6,0,1,3,0,2,5,1,0,4,0,2,1,5,0,3,1,4,0,2,6,0,1,3,0,2,5,1,0,4,0,2][(window._s4-1)%42];}'},
  {name:'Nearly Done',pins:'function(){window._s5=(window._s5||0)+1;return [0,0,1,0,0,2,0,1,0,0,0,1,0,0,0,2,0,0,0,1,0,0,1,0,0,2,0,1,0,0,0,1,0,0,0,2,0,0,0,1,0,0][(window._s5-1)%42];}'},
];
var currentScenario=0;
var cycleTimer=null;

function applyScenario(idx){
  currentScenario=idx;
  var s=scenarios[idx];
  var dots=document.querySelectorAll('.scenario-dot');
  dots.forEach(function(d,i){d.className='scenario-dot'+(i===idx?' active':'');});
  document.getElementById('scenario-label').textContent=s.name;
  // Reset counters in iframe
  var frame=document.getElementById('proto-frame');
  if(frame.contentWindow){
    try{frame.contentWindow._s2=0;frame.contentWindow._s3=0;frame.contentWindow._s4=0;frame.contentWindow._s5=0;}catch(e){}
    frame.contentWindow.postMessage({pinFn:s.pins},'*');
  }
}

function nextScenario(){applyScenario((currentScenario+1)%scenarios.length);}
function prevScenario(){applyScenario((currentScenario-1+scenarios.length)%scenarios.length);}

function startAutoplay(){if(!cycleTimer) cycleTimer=setInterval(nextScenario,8000);}
function stopAutoplay(){if(cycleTimer){clearInterval(cycleTimer);cycleTimer=null;}}

// Start auto-cycling
startAutoplay();

var zoomLevel=100;
document.getElementById('zoom-slider').addEventListener('input',function(e){
  zoomLevel=parseInt(e.target.value);
  document.getElementById('zoom-pct').textContent=zoomLevel+'%';
  sizeTV();
});

sizeTV();
window.addEventListener('resize',sizeTV);
// Apply first scenario after iframe loads
document.getElementById('proto-frame').addEventListener('load',function(){
  setTimeout(function(){applyScenario(0);},500);
});
</script>
</body>
</html>
